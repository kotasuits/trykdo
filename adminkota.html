<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kota Doria | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="blob-bg"></div>
    <div class="blob-bg blob-2"></div>
    
    <nav class="glass-nav">
        <div class="nav-container">
            <h1 class="logo">Kota Doria <span style="font-size: 1rem; color: var(--text-secondary); font-weight: 400;">Admin</span></h1>
            <ul class="nav-links">
                <li><a href="index.html">View Catalog</a></li>
                <li><a href="#" id="logout-btn">Logout</a></li>
            </ul>
        </div>
    </nav>

    <main class="catalog-section" style="padding-top: 4rem;">

        <!-- Upload Product Form -->
        <div style="max-width: 600px; margin: 0 auto 3rem; background: var(--glass-bg); padding: 2.5rem; border-radius: 20px; border: 1px solid var(--glass-border); backdrop-filter: blur(16px);">
            <h2 style="margin-bottom: 2rem; font-size: 2rem;">Add New Product</h2>
            
            <form id="upload-form" style="display: flex; flex-direction: column; gap: 1.5rem;">
                <div id="status-message" style="display: none; padding: 1rem; border-radius: 8px; font-weight: 500;"></div>

                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label for="title" style="color: var(--text-secondary); font-size: 0.9rem;">Product Title</label>
                    <input type="text" id="title" name="title" required style="background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 0.8rem 1rem; border-radius: 8px; color: white; font-family: inherit;">
                </div>

                <div style="display: flex; gap: 1rem;">
                    <div style="display: flex; flex-direction: column; gap: 0.5rem; flex: 1;">
                        <label for="price" style="color: var(--text-secondary); font-size: 0.9rem;">Price (₹ per piece)</label>
                        <input type="number" id="price" name="price" required min="0" step="0.01" style="background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 0.8rem 1rem; border-radius: 8px; color: white; font-family: inherit;">
                    </div>
                    
                    <div style="display: flex; flex-direction: column; gap: 0.5rem; flex: 1;">
                        <label for="category" style="color: var(--text-secondary); font-size: 0.9rem;">Category</label>
                        <div style="display: flex; gap: 0.5rem;">
                            <select id="category" name="category" required style="background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 0.8rem 1rem; border-radius: 8px; color: white; font-family: inherit; flex-grow: 1;">
                                <!-- Dynamic categories -->
                            </select>
                            <button type="button" id="add-cat-ui-btn" style="
                                background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);
                                border-radius: 8px; cursor: pointer; padding: 0 0.75rem;
                                font-size: 1.2rem; color: white; font-family: inherit;">
                                +
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Hidden Add Category Panel -->
                <div id="new-cat-panel" style="display: none; margin-bottom: 0.5rem; padding: 1rem; background: rgba(0,0,0,0.1); border: 1px solid var(--glass-border); border-radius: 8px;">
                    <label style="font-size: 0.8rem; margin-bottom: 0.5rem; display: block; color: var(--text-secondary);">New Category Name</label>
                    <div style="display: flex; gap: 0.5rem;">
                        <input type="text" id="new-cat-name" placeholder="Handloom" style="background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 0.8rem 1rem; border-radius: 8px; color: white; font-family: inherit; flex-grow: 1;">
                        <button type="button" id="submit-new-cat" style="background: var(--accent); color: white; border: none; padding: 0 1rem; border-radius: 8px; font-family: inherit; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.3s;" onmouseover="this.style.background='var(--accent-hover)'" onmouseout="this.style.background='var(--accent)'">Add</button>
                    </div>
                </div>

                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label for="description" style="color: var(--text-secondary); font-size: 0.9rem;">Description</label>
                    <textarea id="description" name="description" rows="4" required style="background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 0.8rem 1rem; border-radius: 8px; color: white; font-family: inherit; resize: vertical;"></textarea>
                </div>

                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label for="images" style="color: var(--text-secondary); font-size: 0.9rem;">Product Images (select multiple)</label>
                    <input type="file" id="images" name="images" accept="image/*" multiple required style="background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 0.8rem 1rem; border-radius: 8px; color: white; font-family: inherit;">
                </div>

                <button type="submit" style="background: var(--accent); color: white; border: none; padding: 1rem; border-radius: 8px; font-family: inherit; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 1rem; transition: background 0.3s;" onmouseover="this.style.background='var(--accent-hover)'" onmouseout="this.style.background='var(--accent)'">
                    Upload to Catalog
                </button>
            </form>
        </div>

        <!-- Manage Products (Delete) -->
        <div style="max-width: 900px; margin: 0 auto; background: var(--glass-bg); padding: 2.5rem; border-radius: 20px; border: 1px solid var(--glass-border); backdrop-filter: blur(16px);">
            <h2 style="margin-bottom: 2rem; font-size: 1.8rem;">Manage Products</h2>
            <div id="admin-product-grid" class="product-grid" style="grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));">
                <p id="admin-loading" style="color: var(--text-secondary); grid-column: 1/-1;">Loading products...</p>
            </div>
        </div>

    </main>

    <script src="admin.js"></script>
</body>
</html>
